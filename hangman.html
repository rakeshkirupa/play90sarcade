<body class="snake-page game-page site-has-footer" data-game="Hangman">
  <div class="bg-animations" aria-hidden="true">
    <div class="pixel-blocks"></div>
    <div class="tetris-shapes"></div>
    <div class="stars"></div>
    <div class="geo-shapes"></div>
  </div>

  <div class="snake-layout">
    <div class="ad-side ad-side-left" role="presentation"><span>Google Ad</span></div>
    <div class="snake-wrapper">
      <a href="index.html" class="back-link">← BACK TO GAMES</a>
      <h1 class="snake-title arcade-game-title">HANGMAN</h1>
      <div class="score-row arcade-scores">
        <span class="score-label score-current">WINS <span id="score">0</span></span>
        <span class="score-label score-high">HIGH SCORE <span id="best">0</span></span>
        <span class="score-label">ROUND <span id="round">1</span></span>
        <span class="score-label">WRONG <span id="wrong">0</span>/6</span>
      </div>
      <div class="game-container game-container-hangman">
        <div class="hangman-area">
          <canvas id="hangmanCanvas" width="280" height="308"></canvas>
          <div class="word-display" id="wordDisplay"></div>
          <div class="letters" id="letters"></div>
        </div>
        <div id="gameOverOverlay" class="game-over-overlay hidden">
          <div class="game-over-box arcade-gameover">
            <div id="newHighScoreBanner" class="new-high-score-banner hidden">NEW HIGH SCORE! ★</div>
            <h2 id="gameOverTitle">GAME OVER</h2>
            <p id="gameOverMessage"></p>
            <p>WINS <span id="finalScore">0</span> | BEST <span id="finalBest">0</span></p>
            <button type="button" id="playAgainBtn" class="btn-play-again" aria-label="Continue">NEXT ROUND</button>
            <p class="hint" id="gameOverHint">SPACE TO CONTINUE</p>
          </div>
        </div>
      </div>
    </div>
    <div class="ad-side ad-side-right" role="presentation"><span>Google Ad</span></div>
  </div>

  <footer class="site-footer site-footer-content site-footer-games">
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="privacy-policy.html">Privacy Policy</a>
      <a href="contact.html">Contact</a>
      <a href="terms.html">Terms</a>
    </nav>
    <p class="footer-tagline">Made for 90s kids who love classic games.</p>
  </footer>

  <script src="js/security.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/sounds.js"></script>
  <script src="js/keyboard-feedback.js"></script>
  <script src="js/hangman.js"></script>
  <script src="js/game-over-restart.js"></script>
  <script src="js/entering-game.js"></script>
</body>
